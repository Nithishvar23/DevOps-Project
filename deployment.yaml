apiVersion: apps/v1
kind: Deployment
metadata:
  name: evenodd-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: evenodd

  template:
    metadata:
      labels:
        app: evenodd

    spec:
      containers:
      - name: evenodd

        image:  nithishvar/evenodd:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8777